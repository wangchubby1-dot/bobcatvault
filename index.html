<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sequence Matrix</title>
<style>
body{margin:0;background:#09111f;color:#dff;font-family:Arial;height:100vh;display:flex;justify-content:center;align-items:center}
.game{width:520px;background:#101a2f;padding:24px;border-radius:16px;box-shadow:0 0 30px #000}
.header{display:flex;justify-content:space-between}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}
.cell{aspect-ratio:1;background:#0d1629;border:2px solid #234;border-radius:8px;transition:.15s}
.flash{background:#4dfcff;box-shadow:0 0 20px #4dfcff}.good{background:#35ff7a}.bad{background:#ff4b4b}
.bar{height:8px;background:#234;border-radius:8px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#35ff7a,#4dfcff);width:100%}
.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;font-size:48px;background:#0008}
button{padding:8px 16px}
</style></head>
<body><div class=game>
<div class=header><div>SEQUENCE MATRIX</div><div>Stage <span id=s>1</span> | <span id=st>WATCH</span></div></div>
<div class=bar><div class=fill id=f></div></div>
<div class=grid id=g></div><button id=r>Restart</button></div>
<div class=overlay id=o></div>
<script>
const g=document.getElementById('g'),f=document.getElementById('f'),s=document.getElementById('s'),st=document.getElementById('st'),o=document.getElementById('o');
let seq=[],cells=[],idx=0,busy=true,stage=1,time=8000,timer;
function beep(fr,d){let a=new(window.AudioContext||webkitAudioContext)(),osc=a.createOscillator(),gain=a.createGain();osc.frequency.value=fr;osc.connect(gain);gain.connect(a.destination);osc.start();gain.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);osc.stop(a.currentTime+d);}
for(let i=0;i<16;i++){let c=document.createElement('div');c.className='cell';c.onclick=()=>click(i);g.appendChild(c);cells.push(c);}
const sl=m=>new Promise(r=>setTimeout(r,m));
async function flash(i,cl='flash'){cells[i].classList.add(cl);beep(700,.08);await sl(250);cells[i].classList.remove(cl);await sl(100);}
async function play(){busy=true;st.textContent='WATCH';for(let x of seq)await flash(x);busy=false;idx=0;st.textContent='REPEAT';startTimer();}
function startTimer(){clearInterval(timer);let max=Math.max(3000,8000-(stage-1)*500),left=max;f.style.width='100%';timer=setInterval(()=>{left-=50;f.style.width=(left/max*100)+'%';if(left<=0){clearInterval(timer);lose();}},50);}
function click(i){if(busy)return;flash(i,'good');if(i!==seq[idx]){lose();return;}idx++;if(idx===seq.length){clearInterval(timer);stage++;if(stage>7)return win();s.textContent=stage;time-=500;seq.push(Math.floor(Math.random()*16));setTimeout(play,600);}}
function lose(){busy=true;beep(180,.3);document.body.animate([{transform:'translateX(-8px)'},{transform:'translateX(8px)'},{transform:'translateX(0)'}],{duration:200});show('ACCESS DENIED','#f44');}
function win(){busy=true;beep(1000,.5);show('ACCESS GRANTED','#3f7');}
function show(t,c){o.style.display='flex';o.style.color=c;o.textContent=t;setTimeout(()=>o.style.display='none',1800);}
function start(){stage=1;s.textContent=1;seq=[Math.floor(Math.random()*16)];setTimeout(play,500);}
document.getElementById('r').onclick=start;start();
</script></body></html>
