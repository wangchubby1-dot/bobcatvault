<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sequence Matrix</title>

<style>

*{
    box-sizing:border-box;
    user-select:none;
}


body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle,#182b55,#050912);
    font-family:Arial,Helvetica,sans-serif;
    color:white;
}



.game{

    width:520px;
    padding:25px;

    background:#101a2f;

    border-radius:20px;

    box-shadow:
    0 0 40px rgba(0,0,0,.8),
    inset 0 0 30px rgba(77,252,255,.05);

}



.header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:15px;

}



.title{

    color:#4dfcff;
    font-size:20px;
    font-weight:bold;
    letter-spacing:3px;

}



.stats{

    text-align:right;
    color:#8fdfe5;
    font-size:14px;

}



.status{

    margin-top:5px;
    color:#4dfcff;

}



.timer{

    height:8px;
    width:100%;

    background:#1b2c4a;

    border-radius:10px;

    overflow:hidden;

}



.timer-fill{

    height:100%;
    width:100%;

    background:
    linear-gradient(
    90deg,
    #35ff7a,
    #4dfcff
    );

}



.grid{

    margin-top:25px;

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:12px;

}




.cell{

    aspect-ratio:1;

    background:#0c1528;

    border-radius:12px;

    border:2px solid #263c61;

    cursor:pointer;

    transition:.12s;

}




.cell:hover{

    border-color:#4dfcff;

}



.cell.flash{

    background:#4dfcff;

    box-shadow:
    0 0 25px #4dfcff;

    transform:scale(1.06);

}



.cell.good{

    background:#35ff7a;

    box-shadow:
    0 0 25px #35ff7a;

}



.cell.bad{

    background:#ff3b4d;

}



.footer{

    margin-top:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}



button{

    background:#1b3a70;

    border:none;

    color:#4dfcff;

    padding:10px 20px;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;

}



button:hover{

    background:#2856a0;

}



.overlay{

    position:fixed;

    inset:0;

    display:none;

    align-items:center;

    justify-content:center;

    background:rgba(0,0,0,.75);

    font-size:48px;

    font-weight:bold;

}



.success{

    color:#35ff7a;

}



.fail{

    color:#ff3b4d;

}


</style>

</head>


<body>


<div class="game">


<div class="header">


<div>

<div class="title">
SEQUENCE MATRIX
</div>


<div class="status">
STATUS:
<span id="status">
WATCH
</span>
</div>


</div>



<div class="stats">


<div>
ROUND:
<span id="stage">1</span>
</div>


<div>
SCORE:
<span id="score">0</span>
</div>


<div>
TIME:
<span id="time">4.0</span>s
</div>


</div>


</div>




<div class="timer">

<div class="timer-fill" id="timerFill"></div>

</div>




<div class="grid" id="grid"></div>




<div class="footer">

<div>
Repeat Sequence
</div>


<button id="restart">
Restart
</button>


</div>


</div>




<div class="overlay" id="overlay"></div>



<script>


const SETTINGS = {

    gridSize:4,

    tileDisplayTime:350,

    levelTimeout:4000,

    targetScore:7

};



const TOTAL_CELLS =
SETTINGS.gridSize *
SETTINGS.gridSize;



const grid =
document.getElementById("grid");

const statusText =
document.getElementById("status");

const stageText =
document.getElementById("stage");

const scoreText =
document.getElementById("score");

const timeText =
document.getElementById("time");

const timerFill =
document.getElementById("timerFill");

const overlay =
document.getElementById("overlay");

const restart =
document.getElementById("restart");



let cells=[];

let sequence=[];

let playerSequence=[];

let round=1;

let score=0;

let busy=true;

let timer;



function sleep(ms){

    return new Promise(
        resolve=>setTimeout(resolve,ms)
    );

}



function createGrid(){

    grid.innerHTML="";

    cells=[];


    for(let i=0;i<TOTAL_CELLS;i++){

        let cell=document.createElement("div");

        cell.className="cell";


        cell.onclick=()=>{

            playerClick(i);

        };


        grid.appendChild(cell);

        cells.push(cell);

    }

}



function generateSequence(){

    sequence=[];


    while(sequence.length < round){

        let tile=Math.floor(
            Math.random()*TOTAL_CELLS
        );


        if(!sequence.includes(tile)){

            sequence.push(tile);

        }

    }

}
async function flashCell(id,type="flash"){

    const cell = cells[id];


    cell.classList.add(type);



    await sleep(
        SETTINGS.tileDisplayTime
    );



    cell.classList.remove(type);

}





async function showSequence(){


    busy=true;


    statusText.textContent="WATCH";


    clearInterval(timer);



    await sleep(300);



    for(const tile of sequence){


        await flashCell(tile);


        // small gap so flashes are readable
        await sleep(150);


    }



    playerSequence=[];


    statusText.textContent="REPEAT";


    busy=false;


    startTimer();


}







function startTimer(){


    clearInterval(timer);



    let start =
    Date.now();



    timer=setInterval(()=>{


        let elapsed =
        Date.now()-start;



        let remaining =
        SETTINGS.levelTimeout-elapsed;



        let percent =
        (remaining / SETTINGS.levelTimeout)*100;



        timerFill.style.width =
        Math.max(0,percent)+"%";



        timeText.textContent =
        Math.max(
            0,
            remaining/1000
        ).toFixed(1);



        if(remaining<=0){


            clearInterval(timer);


            failGame();


        }


    },50);


}







async function playerClick(id){


    if(busy)
        return;



    clearInterval(timer);



    playerSequence.push(id);



    await flashCell(
        id,
        "good"
    );



    let index =
    playerSequence.length-1;



    if(
        playerSequence[index]
        !== sequence[index]
    ){


        failGame();


        return;


    }




    if(
        playerSequence.length
        === sequence.length
    ){


        successRound();


    }
    else{


        startTimer();


    }


}








function successRound(){


    clearInterval(timer);



    busy=true;



    score++;



    scoreText.textContent =
    score;




    if(score >= SETTINGS.targetScore){


        showOverlay(
            "ACCESS GRANTED",
            "success"
        );


        return;


    }



    round++;



    stageText.textContent =
    round;



    generateSequence();



    // immediately continue
    showSequence();


}








function failGame(){


    clearInterval(timer);



    busy=true;



    showOverlay(
        "ACCESS DENIED",
        "fail"
    );


}







function showOverlay(text,type){


    overlay.textContent =
    text;



    overlay.className =
    "overlay "+type;



    overlay.style.display =
    "flex";



    setTimeout(()=>{


        overlay.style.display =
        "none";


    },1200);


}







function startGame(){


    clearInterval(timer);



    round=1;

    score=0;



    stageText.textContent =
    round;



    scoreText.textContent =
    score;



    timeText.textContent =
    "4.0";



    timerFill.style.width =
    "100%";



    statusText.textContent =
    "WATCH";



    createGrid();



    generateSequence();



    showSequence();


}







restart.onclick=()=>{


    startGame();


};






startGame();



</script>


</body>
</html>
